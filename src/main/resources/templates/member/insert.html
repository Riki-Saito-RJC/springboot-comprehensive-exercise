<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01 Transitional//EN" "http://www.w3.org/TR/html4/loose.dtd">
<html>
	<head>
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
		<link rel="stylesheet" type="text/css" href="/css/common.css">
		<title>新規登録</title>
	</head>
	
	<body>
		<div id="wapper">
			<div class="menu">
				<a href="/">メニュー</a><br>
			</div>
			<div class="menu">
				<h2>新規登録画面</h2>
			</div>
			<form th:action="@{/member/insertConf}" method="post" th:object="${member}" novalidate>
				<div th:insert="~{layout :: upsertMessage}"></div>
				<table class="ct">
					<tr class="required">
						<th>社員ID</th>
						<td><input type="text" th:field="*{memberId}" required="required"></td>
					</tr>
					<tr class="required">
						<th>氏名</th>
						<td><input type="text" th:field="*{memberName}" required="required"></td>
					</tr>
					<tr class="required">
						<th>年齢</th>
						<td><input type="text" th:field="*{age}" required="required"></td>
					</tr>
					<tr class="required">
						<th>性別</th>
						<td>
							男<input type="radio" th:field="*{sexFlg}" value="0" required="required">
							女<input type="radio" th:field="*{sexFlg}" value="1">
						</td>
					</tr>
					<tr class="required">
						<th>住所</th>
						<td><input type="text" th:field="*{address}" required="required"></td>
					</tr>
					<tr class="required">
						<th>電話番号</th>
						<td><input type="text" th:field="*{telephone}" required="required"></td>
					</tr>
					<tr class="required">
						<th>メールアドレス</th>
						<td><input type="text" th:field="*{mail}" required="required"></td>
					</tr>
					<tr class="required">
						<th>役職</th>
						<td>
							<!-- 役職の選択肢はDBから取得する -->
							<select th:field="*{positionId}" required="required">
								<option th:each="position : ${positions}" th:value="${position.positionId}"
									 th:text="${position.positionName}">
								</option>
							</select>
						</td>
					</tr>
					<tr class="required">
						<th>事業所</th>
						<td>
							<!-- 事業所の選択肢はDBから取得する -->
							<select th:field="*{placeId}" required="required">
								<option th:each="place : ${places}" th:value="${place.placeId}"
									 th:text="${place.placeName}">
								</option>
							</select>
						</td>
					</tr>
				</table>
				<div class="menu">
					<input type="submit" value="次へ">
				</div>
			</form>
		</div>
	</body>
</html>
